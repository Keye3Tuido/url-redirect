name: Deploy Redirect Page to GitHub Pages

on:
  push:
    branches:
      - master
  repository_dispatch:
    types: [submodule-updated]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.K3T_REPOS }}

      - name: Update submodule to latest
        run: |
          cd redirects
          git fetch origin redirect
          git checkout FETCH_HEAD
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add redirects
          git diff --cached --quiet || git commit -m "chore: update redirects submodule"
          git push

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate redirect page
        run: |
          mkdir -p _site
          python redirects/generator.py redirects/redirects.txt _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
